{% extends 'catalogo/base.html' %}
{% load static %}

{% block content %}
<!-- Hero Section Premium -->
<section class="w-100 overflow-hidden">
    <img src="{% static 'img/hero_banner.png' %}" class="w-100 d-block" style="object-fit: cover; max-height: 55vh;" alt="Artesanix Heritage">
</section>

<!-- Pueblos Mágicos Section -->
<section class="py-5 bg-artisan-bg pb-5 mb-5">
    <div class="container py-lg-4">
        <h2 class="display-6 brand-font text-center text-artisan-dark mb-5 border-0">Pueblos Mágicos</h2>
        
        <div class="row g-4 justify-content-center">
            {% for p in pueblos %}
            <div class="col-6 col-md-4 col-lg-3">
                <a href="{% url 'pueblo_detalle' p.pk %}" class="text-decoration-none text-artisan-dark">
                    <div class="shadow-sm border border-light bg-white rounded-2 overflow-hidden text-center h-100 transition-hover">
                        <div style="height: 160px; overflow: hidden;">
                            {% if p.imagen %}
                                <img src="{{ p.imagen.url }}" alt="{{ p.nombre }}" class="w-100 h-100" style="object-fit: cover;">
                            {% else %}
                                <img src="{% static 'img/default-pueblo.jpg' %}" alt="{{ p.nombre }}" class="w-100 h-100" style="object-fit: cover;">
                            {% endif %}
                        </div>
                        <div class="p-3">
                            <h5 class="mb-0 fs-6 text-truncate" style="font-size: 0.95rem;">{{ p.nombre }}</h5>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<style>
.transition-hover {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.transition-hover:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08) !important;
}
</style>
{% endblock %}
