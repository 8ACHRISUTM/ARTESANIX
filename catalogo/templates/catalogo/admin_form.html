{% extends 'catalogo/base.html' %}

{% block content %}
<section class="py-5 bg-artisan-bg min-vh-100">
    <div class="container py-lg-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border border-light text-center">
                    <h2 class="brand-font display-6 mb-4">{{ titulo }}</h2>
                    <form method="post" enctype="multipart/form-data" class="artisan-form text-start mt-4">
                        {% csrf_token %}
                        <div class="row g-4">
                            {% for field in form %}
                            <div class="{% if field.name == 'descripcion' %}col-12{% else %}col-md-6{% endif %}">
                                <label class="form-label small text-muted mb-1">{{ field.label }}</label>
                                {{ field }}
                                {% if field.help_text %}
                                    <div class="form-text small op-50">{{ field.help_text }}</div>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="text-danger small mt-1">{{ error }}</div>
                                {% endfor %}
                            </div>
                            {% endfor %}
                        </div>
                        
                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-accent btn-lg px-5">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
